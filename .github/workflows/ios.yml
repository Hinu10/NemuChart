name: iOS CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Select an available iPhone simulator
        run: |
          DEVICE_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')"
          test -n "$DEVICE_ID"
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
      - name: Build all test targets
        run: >-
          xcodebuild -project NemuChart.xcodeproj -scheme NemuChart
          -destination "platform=iOS Simulator,id=$DEVICE_ID"
          -derivedDataPath "$RUNNER_TEMP/NemuChartDerivedData"
          CODE_SIGNING_ALLOWED=NO build-for-testing
      - name: Run unit tests
        run: >-
          xcodebuild -project NemuChart.xcodeproj -scheme NemuChart
          -destination "platform=iOS Simulator,id=$DEVICE_ID"
          -derivedDataPath "$RUNNER_TEMP/NemuChartDerivedData"
          -parallel-testing-enabled NO test-without-building
          -only-testing:NemuChartTests
      - name: Run UI tests
        run: >-
          xcodebuild -project NemuChart.xcodeproj -scheme NemuChart
          -destination "platform=iOS Simulator,id=$DEVICE_ID"
          -derivedDataPath "$RUNNER_TEMP/NemuChartDerivedData"
          -parallel-testing-enabled NO test-without-building
          -only-testing:NemuChartUITests
